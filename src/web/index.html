<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进程调度算法可视化系统</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="header">
    <h1>⚙ 进程调度算法可视化系统</h1>
    <p>Process Scheduling Algorithm Visualization — 操作系统课程设计</p>
</div>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="input">📝 进程输入</button>
        <button class="tab-btn" data-tab="gantt">📊 Gantt 图</button>
        <button class="tab-btn" data-tab="compare">📈 算法对比</button>
        <button class="tab-btn" data-tab="detail">📋 详细结果</button>
    </div>

    <div id="tab-input" class="tab-content active">
        <div class="input-section">
            <div class="card">
                <h2>➕ 添加进程</h2>
                <div class="form-group">
                    <label>进程名称</label>
                    <input type="text" id="pName" placeholder="如 P1">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.8rem;">
                    <div class="form-group">
                        <label>到达时间</label>
                        <input type="number" id="pArrival" value="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>服务时间</label>
                        <input type="number" id="pBurst" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>优先级</label>
                        <input type="number" id="pPriority" value="0" min="0">
                    </div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="addProcess()">添加进程</button>
                    <button class="btn btn-secondary" onclick="addRandomProcesses()">随机生成 5 个</button>
                    <button class="btn btn-danger" onclick="clearProcesses()">清空全部</button>
                </div>
                <div class="preset-btns">
                    <label style="font-size:0.85rem;color:var(--text2)">预设用例：</label>
                    <div class="btn-group" style="margin-top:0.3rem">
                        <button class="btn btn-secondary" onclick="loadPreset(1)">经典5进程</button>
                        <button class="btn btn-secondary" onclick="loadPreset(2)">同时到达</button>
                        <button class="btn btn-secondary" onclick="loadPreset(3)">10进程</button>
                        <button class="btn btn-secondary" onclick="loadPreset(4)">长短混合</button>
                        <button class="btn btn-secondary" onclick="loadPreset(5)">间隔到达</button>
                    </div>
                </div>
            </div>
            <div class="card">
                <h2>📋 当前进程列表 (<span id="processCount">0</span> 个)</h2>
                <div style="max-height:400px;overflow-y:auto;">
                    <table class="process-table">
                        <thead>
                        <tr><th>PID</th><th>名称</th><th>到达</th><th>服务</th><th>优先级</th><th></th></tr>
                        </thead>
                        <tbody id="processTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🚀 运行调度算法</h2>
            <p style="font-size:0.85rem;color:var(--text2);margin-bottom:1rem">选择要运行的算法（可多选），然后点击"开始调度"</p>
            <div class="algo-chips" id="algoChips"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="runScheduling()" style="font-size:1rem;padding:0.8rem 2rem">▶ 开始调度</button>
                <button class="btn btn-secondary" onclick="selectAllAlgos()">全选</button>
                <button class="btn btn-secondary" onclick="loadJsonData()">📂 加载 JSON 数据</button>
                <input type="file" id="jsonFileInput" accept=".json" style="display:none" onchange="handleJsonFile(event)">
            </div>
        </div>
    </div>

    <div id="tab-gantt" class="tab-content">
        <div class="card" id="ganttContainer">
            <h2>📊 Gantt 图可视化</h2>
            <p class="loading" id="ganttPlaceholder">请先在"进程输入"页添加进程并运行调度算法</p>
        </div>
    </div>

    <div id="tab-compare" class="tab-content">
        <div class="card" id="compareContainer">
            <h2>📈 多算法性能对比</h2>
            <p class="loading" id="comparePlaceholder">请先运行调度算法</p>
        </div>
    </div>

    <div id="tab-detail" class="tab-content">
        <div class="card" id="detailContainer">
            <h2>📋 详细调度结果</h2>
            <p class="loading" id="detailPlaceholder">请先运行调度算法</p>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/state.js"></script>
<script src="js/algorithms.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
